[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm install"

# Every request to /api/* gets routed to our single Express function.
# Example: a browser fetch("/api/content") becomes a call into
# netlify/functions/api.js, which still sees the path as "/api/content"
# inside Express (Netlify passes the full original path through).
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[functions]
  node_bundler = "esbuild"
